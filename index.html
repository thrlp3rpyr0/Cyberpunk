<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON HEAVEN // NEXUS DATABASE</title>
    <!-- Enlace a los estilos globales de la terminal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CONTENEDOR PRINCIPAL DE LA TERMINAL -->
    <div class="terminal-container">
        
        <!-- ==========================================================================
             SIDEBAR // MENÚ DE NAVEGACIÓN DE DATOS (NET RUNNER INTERFACE)
             ========================================================================== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="status-indicator"></div>
                <h1>NEXUS_DB // v2.0</h1>
            </div>
            
            <nav class="database-menu">
                <button class="menu-item active" data-category="arms">
                    <span class="menu-icon">⚡</span> ARSENAL
                </button>
                <button class="menu-item" data-category="cyberware">
                    <span class="menu-icon">👁️</span> CIBERWARE
                </button>
                <button class="menu-item" data-category="software">
                    <span class="menu-icon">💾</span> NETRUNNING
                </button>
                <button class="menu-item" data-category="restricted">
                    <span class="menu-icon">💀</span> BLACK ICE
                </button>
                <button class="menu-item" data-category="biotech">
                    <span class="menu-icon">🧪</span> BIOTECNOLOGÍA
                </button>
                <button class="menu-item" data-category="vehicles">
                    <span class="menu-icon">🛸</span> VEHÍCULOS
                </button>
                <button class="menu-item" data-category="corporations">
                    <span class="menu-icon">🏢</span> CORPORACIONES
                </button>
                <button class="menu-item" data-category="districts">
                    <span class="menu-icon">📍</span> DISTRITOS
                </button>
            </nav>

            <!-- MONITOR DE LOGS INFERIOR EN EL SIDEBAR -->
            <div class="terminal-logs-panel">
                <div class="logs-header">TERMINAL_LOGS // HOST: NC_SUBNET</div>
                <div id="terminal-log-stream" class="logs-stream">
                    <!-- Los logs automáticos de app.js se inyectan aquí -->
                    <p class="log-line">> CORE_SYS: LINK ESTABLISHED...</p>
                </div>
            </div>
        </aside>

        <!-- ==========================================================================
             VIEWPORT CENTRAL // VISOR DINÁMICO DE ARCHIVOS Y HOLOGRAMAS
             ========================================================================== -->
        <main class="viewport" id="content-window">
            
            <!-- CABECERA DE LA ENTIDAD CON PAGINACIÓN TÁCTICA -->
            <div class="entity-header">
                <div class="entity-title-block">
                    <span id="ent-tag" class="entity-tag">LOADING DATASTREAM...</span>
                    <h2 id="ent-name">CONNECTING TO NET...</h2>
                </div>
                
                <!-- CONTENEDOR DE CONTROL FLUIDO ◀ ▶ -->
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="tactical-pagination" style="display: flex; gap: 5px; font-family: monospace;">
                        <button id="nav-prev-entity" style="background: rgba(157, 20, 58, 0.2); border: 1px solid #9d143a; color: #ffffff; cursor: pointer; padding: 4px 12px; font-weight: bold; font-size: 0.9rem; transition: background 0.2s;">◀</button>
                        <span id="nav-entity-counter" style="color: #ff2a5f; padding: 4px 8px; font-size: 0.85rem; min-width: 45px; text-align: center; font-weight: bold; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 42, 95, 0.2);">1 / 1</span>
                        <button id="nav-next-entity" style="background: rgba(157, 20, 58, 0.2); border: 1px solid #9d143a; color: #ffffff; cursor: pointer; padding: 4px 12px; font-weight: bold; font-size: 0.9rem; transition: background 0.2s;">▶</button>
                    </div>
                    <span id="ent-serial" class="entity-serial">SYS-ERR-000</span>
                </div>
            </div>

            <!-- CUERPO DEL VISOR: HOLOGRAMA Y ESTADÍSTICAS DEL REGLAMENTO -->
            <div class="viewport-body">
                
                <!-- SECCIÓN IZQUIERDA: VISUALIZACIÓN / HOLOGRAMA -->
                <div class="visual-panel">
                    <div class="hologram-frame">
                        <img id="entity-image" src="" alt="Hologram View" class="hidden">
                        <div class="scan-line"></div>
                    </div>
                    <p id="ent-desc" class="entity-description">
                        Esperando sincronización de datos con el archivo remoto database.json...
                    </p>
                </div>

                <!-- SECCIÓN DERECHA: ESTADÍSTICAS Y MODS (CYBERPUNK RED CORES) -->
                <div class="stats-panel">
                    
                    <!-- BARRAS DE PROGRESO DE ATRIBUTOS -->
                    <div class="stats-section">
                        <h3>DATOS DE RENDIMIENTO // REGLAMENTO ROJO</h3>
                        <div id="attribute-bars" class="attribute-bars-container">
                            <!-- Inyección dinámica desde app.js (Daño, ROF, Humanidad...) -->
                        </div>
                    </div>

                    <!-- RANURAS DE MEJORAS / COMPONENTES -->
                    <div class="mods-section">
                        <h3>RANURAS DE EXPANSIÓN // COMPONENTES</h3>
                        <div class="mods-grid">
                            <!-- Inyección dinámica de ranuras activas o [ SLOT_EMPTY ] -->
                        </div>
                    </div>

                </div>

            </div>
        </main>

    </div>

    <!-- Enlace a la lógica del sistema con soporte para carrusel -->
    <script src="app.js"></script>
</body>
</html>
